name: Audit qualité

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (SSG)
        run: pnpm generate

      # Lighthouse : perf / a11y / SEO / best-practices contre le dist statique.
      # Ne valide PAS HSTS/CSP (localhost HTTP) — c'est le rôle du plugin Netlify.
      - name: Lighthouse
        run: pnpm audit:lighthouse
