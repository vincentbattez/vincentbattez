[build]
command = "pnpm generate"
publish = "dist"

[functions]
directory = "netlify/functions"

[build.environment]
NODE_VERSION = "22"

# Lighthouse à chaque déploiement, contre l'URL HTTPS réelle : seul point qui
# valide HSTS/CSP (invisibles sur localhost). Non bloquant volontairement — les
# échecs de contraste sur les couleurs de marque sont assumés (cf. a11y). Pour
# rendre bloquant : décommenter [plugins.inputs.thresholds].
[[plugins]]
package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
  output_path = "reports/lighthouse.html"

  [plugins.inputs.audits]
  path = "index.html"

  # [plugins.inputs.thresholds]
  # performance = 0.9
  # seo = 1.0
  # best-practices = 0.95
  # accessibility = 0.9

# En-têtes de sécurité appliqués à toutes les réponses.
[[headers]]
for = "/*"

[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Assets fingerprintés (hash dans le nom) : cache immutable 1 an.
[[headers]]
for = "/_nuxt/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_fonts/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Non fingerprintés (renommer le fichier pour invalider) : cache 1 semaine.
[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/og/*"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/favicon.ico"

[headers.values]
Cache-Control = "public, max-age=604800"
