[build]
command = "pnpm generate"
publish = "dist"

[functions]
directory = "netlify/functions"

[build.environment]
NODE_VERSION = "22"

# Assets fingerprintés (hash dans le nom) : cache immutable 1 an.
[[headers]]
for = "/_nuxt/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_fonts/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Non fingerprintés (renommer le fichier pour invalider) : cache 1 semaine.
[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/og/*"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/favicon.ico"

[headers.values]
Cache-Control = "public, max-age=604800"
